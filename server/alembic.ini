[alembic]
script_location = migrations
prepend_sys_path = .
# NOTE: keep this file ASCII-only. configparser reads it with the system locale
# encoding (cp949 on Windows), so Korean comments break `alembic`.
# sqlalchemy.url is injected by migrations/env.py from app.core.settings.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
