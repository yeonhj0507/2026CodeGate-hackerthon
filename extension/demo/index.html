<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prober · Stream B mock UI</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
        color: #1a1c1e;
        background: #fafafa;
        line-height: 1.9;
      }
      .article { max-width: 720px; margin: 0 auto; padding: 48px 32px 200px; }
      .article h1 { font-size: 28px; }
      .article p { font-size: 16px; color: #33373b; }
      .devbar {
        position: fixed; left: 16px; bottom: 16px; z-index: 999;
        display: flex; gap: 8px; flex-wrap: wrap;
        background: #111; color: #fff; padding: 10px 12px; border-radius: 10px;
        box-shadow: 0 6px 20px rgba(0,0,0,.25); font-size: 13px;
      }
      .devbar span { align-self: center; opacity: .6; margin-right: 4px; }
      .devbar button {
        border: none; border-radius: 7px; padding: 7px 11px; cursor: pointer;
        background: #2563eb; color: #fff; font: inherit;
      }
    </style>
  </head>
  <body>
    <article class="article">
      <h1>한국은행, 기준금리 0.25%p 인상… 물가·환율 파장은</h1>
      <p>한국은행은 기준금리를 0.25%포인트 인상했다. 시장의 예상에 대체로 부합하는 결정이었다.</p>
      <p>이번 인상으로 시중 자금 조달 비용이 오르면서 가계와 기업의 이자 부담이 커질 전망이다.</p>
      <p>전문가들은 이번 조치가 원화 가치와 수입 물가에 어떤 영향을 줄지 주목하고 있다.</p>
      <p>한편 지난달 무역수지는 두 달 연속 흑자를 기록했다. 반도체 수출 회복이 주된 요인으로 꼽힌다.</p>
    </article>

    <div class="devbar" id="devbar">
      <span>DEV</span>
      <button data-quiz="0">질문 1 시작 (기준금리)</button>
      <button data-quiz="1">질문 2 시작 (무역수지)</button>
    </div>

    <script type="module" src="./main.tsx"></script>
  </body>
</html>
