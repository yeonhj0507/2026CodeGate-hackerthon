name: prober_local
description: "프로버(Prober) 로컬 앱 — 지식그래프(생각 지도) 원본 보유·시각화·동기화"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # 상태관리
  flutter_riverpod: ^2.6.1

  # 로컬 저장 (그래프·학습이력·선호패턴 원본)
  drift: ^2.23.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.27
  path_provider: ^2.1.5

  # 통신 / 토큰
  dio: ^5.7.0
  # v10부터 Windows 구현이 ATL 의존을 버렸다. v9를 쓰면 Visual Studio에
  # "C++ ATL" 컴포넌트를 따로 깔아야 Windows 빌드가 된다.
  flutter_secure_storage: ^10.3.1

  # 그래프 시각화
  graphview: ^1.2.0

  # 외부 링크
  url_launcher: ^6.3.1

  # 로고 마크(SVG)
  flutter_svg: ^2.0.16

# DTO는 서버와의 계약 문서 역할을 겸하므로 fromJson/toJson을 직접 작성한다.
# 코드 생성은 drift 스키마 하나로 제한해 빌드 의존성을 줄였다.
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  drift_dev: ^2.23.1

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
